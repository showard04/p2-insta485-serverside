<!DOCTYPE html>
<html lang="en">
<head>
    <title>insta485</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
</head>
<body>
    <a href="/">insta485 </a>
    <a href="/explore/">explore </a>
    <a href="/users/{{ logname }}/">{{ logname }}</a>

<hr>

<h2>followers</h2>

{% for user in followers %}
    <a href="/users/{{ user.username }}/">
        <img src="/uploads/{{ user.user_img_url }}" alt="{{ user.username }} profile picture" width="50">
    </a>
    <a href="/users/{{ user.username }}/">{{ user.username }}</a>

    {% if user.username != logname %}
        {% if user.follower in logname_following_list %}
        <span>following</span>
        <form action="{{ url_for('update_following') }}?target={{ request.path }}" method="post" enctype="multipart/form-data">
            <input type="submit" name="unfollow" value="unfollow"/>
            <input type="hidden" name="username" value="{{ user.username }}"/>
            <input type="hidden" name="operation" value="unfollow"/>
        </form>
        {% else %}
        <span>not following</span>
        <form action="{{ url_for('update_following') }}?target={{ request.path }}" method="post" enctype="multipart/form-data">
            <input type="submit" name="follow" value="follow"/>
            <input type="hidden" name="username" value="{{ user.username }}"/>
            <input type="hidden" name="operation" value="follow"/>
        </form>
        {% endif %}
    {% endif %}
    <br>
{% endfor %}
</body>
</html>
