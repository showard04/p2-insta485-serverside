<!DOCTYPE html>
<html lang="en">
<head>
  <title>insta485</title>
</head>
<body>
  <header>
    <a href="{{url_for('show_index')}}">insta485</a>
  </header>

  <main>
    <img src="{{url_for('show_upload', filename=user.filename)}}" alt="{{ user.username }} profile picture">
    <p>{{ user.username }}</p>

    <form action="{{url_for('update_accounts')}}?target={{url_for('show_edit')}}" method="post" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <p>Photo</p>
      <input type="file" name="file" accept="image/*"/>
      <p>Name</p>
      <input type="text" name="fullname" value="{{ user.fullname }}" required/>
      <p>Email</p>
      <input type="text" name="email" value="{{ user.email }}" required/>
      <input type="submit" name="update" value="submit"/>
      <input type="hidden" name="operation" value="edit_account"/>
    </form>

    <p>
      <a href="{{url_for('show_password')}}">Change password</a>
    </p>

    <p>
      <a href="{{url_for('show_delete')}}">Delete account</a>
    </p>
  </main>
</body>
</html>
